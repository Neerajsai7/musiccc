<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyMusic</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
    display:flex;
    height:100vh;
    background: #0b132b; 
    background: linear-gradient(135deg, #0b132b, #1c2541, #1e3c72);
    overflow: hidden;
}

/* SIDEBAR */
.sidebar {
    width:220px;
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(15px);
    border-right: 1px solid rgba(255, 255, 255, 0.15);
    color:white;
    padding:20px;
    z-index: 10;
}
.sidebar h2 { margin-bottom:30px; }
.sidebar li {
    list-style:none; padding:12px; cursor:pointer; border-radius:6px; transition: 0.3s;
}
.sidebar li:hover { background:rgba(255,255,255,0.20); }

/* MAIN */
.main { flex:1; display:flex; flex-direction:column; position: relative; }

/* TOPBAR */
.topbar {
    height:60px; background:rgba(255,255,255,0.10); backdrop-filter:blur(15px);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px; border-bottom:1px solid rgba(255,255,255,0.15);
    color: white; font-weight: bold;
}
.search {
    padding:8px 12px; border-radius:20px; border:none; background: rgba(255, 255, 255, 0.8);
}

/* CONTENT */
.content { flex:1; padding:25px; overflow-y:auto; padding-bottom: 120px; }
.grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:20px;
}

/* CARD */
.card {
    background:rgba(255,255,255,0.10); backdrop-filter:blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.15); border-radius:12px;
    padding:15px; box-shadow:0 8px 20px rgba(0,0,0,0.25);
    cursor:pointer; position:relative; transition:0.35s;
}
.card:hover {
    transform:scale(1.05) translateY(-4px); background:rgba(255,255,255,0.15);
}
.cover {
    height:120px; border-radius:8px; background-size:cover; background-position:center; margin-bottom:10px;
}
.title { font-weight:bold; color:white; margin-bottom: 5px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.artist { font-size:12px; color:#a0aec0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

/* ICONS */
.like {
    position:absolute; top:10px; right:10px; font-size:16px; cursor:pointer;
    transition: 0.3s; background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%; width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center; z-index: 5;
}

/* PLAYER BAR */
.player {
    position:fixed; bottom:0; left: 0; width: 100%; height:100px;
    background:rgba(255,255,255,0.10); backdrop-filter:blur(25px);
    border-top:1px solid rgba(255,255,255,0.2); display:none; 
    align-items:center; gap:15px; padding:0 20px; transition: 0.4s ease-in-out; z-index: 1000;
}
.player.fullscreen {
    height: 100vh; flex-direction: column; justify-content: center;
    background: linear-gradient(135deg, #0b132b, #1c2541, #1e3c72);
}
.player.fullscreen img { width: 250px; height: 250px; border-radius: 20px; margin-bottom: 20px; }

#closePlayerBtn {
    position: absolute; top: 8px; left: 8px; color: #a0aec0; cursor: pointer;
    z-index: 1001; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
}
.player.fullscreen #closePlayerBtn { display: none; }

#backBtn {
    position: absolute; top: 30px; left: 20px; color: white; cursor: pointer;
    display: none; background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px);
    padding: 10px 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.3);
}
.player.fullscreen #backBtn { display: block; }

.player img { width:60px; height:60px; border-radius:8px; cursor: pointer; }
.player-info { flex:1; color:white; cursor: pointer; }
#progressContainer { width:100%; height:6px; background:rgba(255,255,255,0.2); border-radius:4px; margin-top:10px; cursor: pointer; }
#progressBar { width:0%; height:100%; background: #fff; border-radius:4px; }

/* BUTTONS */
.player-controls { display: flex; gap: 8px; }
button {
    background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.3); color: white; padding: 10px 15px;
    border-radius: 20px; cursor: pointer; transition: 0.3s;
}
button:hover { background: rgba(255, 255, 255, 0.25); transform: scale(1.05); }

/* CONTEXT MENU */
.context-menu {
    position: absolute; display: none; background: rgba(11, 19, 43, 0.9);
    backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px; padding: 8px; width: 170px; z-index: 2000;
}
.context-menu-item { color: white; padding: 10px; font-size: 14px; cursor: pointer; border-radius: 8px; }
.context-menu-item:hover { background: rgba(255, 255, 255, 0.1); }
.delete-item { color: #ff4b2b; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 5px; }

/* MODAL */
.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
    display: none; align-items: center; justify-content: center; z-index: 3000;
}
.modal-content {
    background: #1c2541; padding: 25px; border-radius: 16px; width: 320px; color: white;
}
.modal-content input {
    width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: none; background: #fff;
}

/* TOAST */
.toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(20px);
    padding: 12px 24px; border-radius: 30px; color: white; z-index: 9999;
    display: flex; align-items: center; gap: 10px; transition: 0.4s;
}
.toast.hidden { opacity: 0; top: -50px; }

.section { display:none; }
.active { display:block; }
</style>
</head>
<body>

<div class="sidebar">
    <h2>SkyMusic</h2>
    <ul>
        <li onclick="showSection('home')">🏠 Home</li>
        <li onclick="showSection('search')">🔎 Search</li>
        <li onclick="showSection('library')">❤️ Library</li>
        <li onclick="showSection('addsong')">➕ Add</li>
    </ul>
</div>

<div class="main">
    <div class="topbar">
        <input class="search" id="searchInput" placeholder="Search songs..." onkeyup="searchSongs()" style="display:none;">
        <div id="pageTitle">Home</div>
    </div>

    <div class="content">
        <div id="home" class="section active">
            <h2 style="color:white; margin-bottom: 20px;">Recommended</h2>
            <div class="grid" id="songGrid"></div>
        </div>
        <div id="search" class="section">
            <h2 style="color:white; margin-bottom: 20px;">Search</h2>
            <div class="grid" id="searchResults"></div>
        </div>
        <div id="library" class="section">
            <h2 style="color:white;">Your Library</h2>
            <h3 style="color:#87CEEB; margin: 20px 0 10px;">❤️ Likes</h3>
            <div class="grid" id="likedSongsGrid"></div>
            <h3 style="color:#6dd5fa; margin: 30px 0 10px;">⬇️ Downloads</h3>
            <div class="grid" id="downloadedSongsGrid"></div>
        </div>
        <div id="addsong" class="section">
            <h2 style="color:white; margin-bottom: 20px;">Add Song</h2>
            <div class="addForm">
                <input id="songName" placeholder="Name">
                <input id="artistName" placeholder="Artist">
                <input id="coverURL" placeholder="Cover Image URL">
                <input id="songURL" placeholder="Direct MP3 URL">
                <p style="color:white; margin:10px 0;">OR Upload File:</p>
                <input type="file" id="localAudio" accept="audio/*">
                <button onclick="addSong()" style="margin-top:10px;">Add Song</button>
            </div>
        </div>
    </div>

    <div class="player" id="player">
        <div id="closePlayerBtn" onclick="closePlayer()">✖</div>
        <div id="backBtn" onclick="shrinkPlayer()">⬅ Down</div>
        <img id="playerCover" onclick="expandPlayer()">
        <div class="player-info" onclick="expandPlayer()">
            <div id="playerTitle" style="font-weight:bold;"></div>
            <div id="playerArtist" style="font-size:12px; color:#a0aec0;"></div>
            <div id="progressContainer" onclick="scrub(event)">
                <div id="progressBar"></div>
            </div>
        </div>
        <div class="player-controls">
            <button onclick="togglePlay()">▶/⏸</button>
            <button onclick="nextSong()">⏭</button>
        </div>
    </div>
</div>

<div id="contextMenu" class="context-menu">
    <div id="cmDownloadBtn" class="context-menu-item" onclick="handleCmDownload()">⬇️ Download</div>
    <div class="context-menu-item" onclick="handleCmEdit()">✏️ Edit Info</div>
    <div class="context-menu-item delete-item" onclick="handleCmDelete()">🗑️ Delete Song</div>
</div>

<div id="editModal" class="modal-overlay">
    <div class="modal-content">
        <h3>Edit Info</h3>
        <input id="editTitleInput" placeholder="Title">
        <input id="editArtistInput" placeholder="Artist">
        <input id="editCoverInput" placeholder="Cover URL">
        <div style="display:flex; justify-content:space-between;">
            <button onclick="saveEditedSong()">Save</button>
            <button onclick="closeEditModal()" style="background:rgba(255,255,255,0.1)">Cancel</button>
        </div>
    </div>
</div>

<div id="downloadToast" class="toast hidden">
    <div id="toastSpinner" style="width:18px; height:18px; border:2px solid #fff; border-top-color:transparent; border-radius:50%; animation:spin 1s linear infinite;"></div>
    <span id="toastText">Downloading...</span>
</div>

<script src="server.js"></script>
</body>
</html>
