<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyMusic</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

body {
    display:flex;
    height:100vh;
    background: linear-gradient(-45deg,#1e3c72,#2a5298,#87CEEB,#6dd5fa);
    background-size:400% 400%;
    animation:bgmove 12s ease infinite;
    overflow: hidden;
}

@keyframes bgmove {
    0% {background-position:0% 50%}
    50% {background-position:100% 50%}
    100% {background-position:0% 50%}
}

/* SIDEBAR */
.sidebar {
    width:220px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-right: 1px solid rgba(255, 255, 255, 0.2);
    color:white;
    padding:20px;
    z-index: 10;
}

.sidebar h2 { margin-bottom:30px; }

.sidebar li {
    list-style:none;
    padding:12px;
    cursor:pointer;
    border-radius:6px;
    transition: 0.3s;
}

.sidebar li:hover { background:rgba(255,255,255,0.25); }

/* MAIN */
.main { flex:1; display:flex; flex-direction:column; position: relative; }

/* TOPBAR */
.topbar {
    height:60px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    border-bottom:1px solid rgba(255,255,255,0.2);
    color: white;
    font-weight: bold;
}

.search {
    padding:8px 12px;
    border-radius:20px;
    border:none;
    background: rgba(255, 255, 255, 0.8);
}

/* CONTENT */
.content { flex:1; padding:25px; overflow-y:auto; padding-bottom: 120px; }

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:20px;
}

/* CARD */
.card {
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius:12px;
    padding:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    cursor:pointer;
    position:relative;
    transition:0.35s;
}

.card:hover {
    transform:scale(1.05) translateY(-4px);
    background:rgba(255,255,255,0.25);
    box-shadow:0 20px 40px rgba(0,0,0,0.35);
}

.cover {
    height:120px;
    border-radius:8px;
    background-size:cover;
    background-position:center;
    margin-bottom:10px;
}

.title { font-weight:bold; color:white; margin-bottom: 5px; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.artist { font-size:12px; color:#e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

.like {
    position:absolute;
    top:10px;
    right:10px;
    font-size:20px;
    cursor:pointer;
    transition: 0.2s;
    background: rgba(0,0,0,0.4);
    border-radius: 50%;
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
}

.like:hover { transform: scale(1.1); }

/* DOWNLOAD ICON */
.download-icon {
    position:absolute;
    top:10px;
    left:10px;
    font-size:16px;
    cursor:pointer;
    background:rgba(0,0,0,0.4);
    border-radius:50%;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition:0.3s;
}

.download-icon:hover {
    background:rgba(0,0,0,0.8);
    transform: scale(1.1);
}

/* PLAYER */
.player {
    position:fixed;
    bottom:0; left: 0; width: 100%;
    height:100px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(25px);
    border-top:1px solid rgba(255,255,255,0.3);
    display:none; 
    align-items:center;
    gap:15px;
    padding:0 20px;
    transition: 0.4s ease-in-out;
    z-index: 1000;
}

.player.fullscreen {
    height: 100vh;
    flex-direction: column;
    justify-content: center;
    padding: 50px;
    background: linear-gradient(-45deg,#1e3c72,#2a5298);
}

.player.fullscreen img {
    width: 250px;
    height: 250px;
    margin-bottom: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.player.fullscreen .player-info {
    text-align: center;
    max-width: 600px;
    margin-bottom: 30px;
}

.player.fullscreen #playerTitle { font-size: 28px; margin-bottom: 10px; }
.player.fullscreen #playerArtist { font-size: 18px; margin-bottom: 20px; }

#backBtn {
    position: absolute;
    top: 30px;
    left: 20px;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: none;
    font-weight: bold;
    background: rgba(255,255,255,0.2);
    padding: 10px 20px;
    border-radius: 30px;
}

.player.fullscreen #backBtn { display: block; }

.player img {
    width:60px;
    height:60px;
    border-radius:8px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.player-info { flex:1; color:white; width: 100%; cursor: pointer; }

#playerTitle { font-weight: bold; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
#playerArtist { font-size: 12px; color: #e2e8f0; }

#progressContainer {
    width:100%;
    height:6px;
    background:rgba(255,255,255,0.3);
    border-radius:4px;
    cursor:pointer;
    margin-top:10px;
    margin-bottom: 5px;
}

#progressBar {
    width:0%;
    height:100%;
    background:#00c6ff;
    border-radius:4px;
    box-shadow:0 0 10px #00c6ff;
}

.player-times {
    display:flex;
    justify-content:space-between;
    font-size:11px;
}

/* BUTTONS */
.player-controls { display: flex; gap: 8px; align-items: center; }

button {
    background:#00c6ff;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:20px;
    cursor:pointer;
    box-shadow:0 0 10px rgba(0, 198, 255, 0.4);
    font-weight: bold;
    transition: 0.2s;
    font-size: 14px;
}

button:hover { opacity:0.85; transform: scale(1.05); }

.loop-active {
    background: #ff4b2b !important;
    box-shadow: 0 0 10px rgba(255, 75, 43, 0.5) !important;
}

.addForm input {
    display:block;
    margin-bottom:10px;
    padding:10px;
    width:100%;
    max-width: 300px;
    border-radius: 8px;
    border: none;
}

/* MOBILE RESPONSIVENESS */
@media (max-width: 768px) {
    body { flex-direction: column; }
    .sidebar { width: 100%; height: auto; display: flex; justify-content: space-around; padding: 10px; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.2); }
    .sidebar h2 { display: none; }
    .sidebar li { padding: 8px; font-size: 14px; }
    .player-controls { gap: 5px; }
    button { padding: 8px 12px; font-size: 12px;}
}

.section {display:none;}
.active {display:block;}
</style>
</head>

<body>

<div class="sidebar">
    <h2>SkyMusic</h2>
    <ul>
        <li onclick="showSection('home')">🏠 Home</li>
        <li onclick="showSection('search')">🔎 Search</li>
        <li onclick="showSection('library')">❤️ Library</li>
        <li onclick="showSection('addsong')">➕ Add</li>
    </ul>
</div>

<div class="main">
    <div class="topbar">
        <input class="search" id="searchInput" placeholder="Search songs..." onkeyup="searchSongs()" style="display:none;">
        <div id="pageTitle">Home</div>
    </div>

    <div class="content">
        <div id="home" class="section active">
            <h2 style="color:white; margin-bottom: 20px;">Recommended Songs</h2>
            <div class="grid" id="songGrid"></div>
        </div>

        <div id="search" class="section">
            <h2 style="color:white; margin-bottom: 20px;">Search Songs</h2>
            <div class="grid" id="searchResults"></div>
        </div>

        <div id="library" class="section">
            <h2 style="color:white; margin-bottom: 10px;">Your Library</h2>
            
            <h3 style="color:#87CEEB; margin: 20px 0 15px 0;">❤️ Liked Songs</h3>
            <div class="grid" id="likedSongsGrid"></div>
            
            <hr style="margin: 30px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.2);">

            <h3 style="color:#6dd5fa; margin-bottom: 15px;">⬇️ Downloaded & Offline</h3>
            <div class="grid" id="downloadedSongsGrid"></div>
        </div>

        <div id="addsong" class="section">
            <h2 style="color:white; margin-bottom: 20px;">Add Custom Song</h2>
            <div class="addForm">
                <input id="songName" placeholder="Song Name (Required)">
                <input id="artistName" placeholder="Artist Name">
                <input id="coverURL" placeholder="Cover Image URL (Optional)">
                
                <hr style="margin: 20px 0; max-width: 300px; border: 0; border-top: 1px solid rgba(255,255,255,0.3);">
                
                <p style="color:white; font-size:13px; margin-bottom:8px;">Option 1: Internet MP3 URL</p>
                <input id="songURL" placeholder="https://...">
                
                <p style="color:white; font-size:14px; margin: 15px 0 10px 0; font-weight:bold; text-align:center; max-width:300px;">OR</p>
                
                <p style="color:white; font-size:13px; margin-bottom:8px;">Option 2: Upload MP3 from device (100% Offline)</p>
                <input type="file" id="localAudio" accept="audio/*" style="background: rgba(255,255,255,0.8); color: black;">
                
                <button onclick="addSong()" style="margin-top: 15px;">Add Song</button>
            </div>
        </div>
    </div>

    <div class="player" id="player">
        <div id="backBtn" onclick="shrinkPlayer()">⬅ Down</div>
        
        <img id="playerCover" onclick="expandPlayer()">
        
        <div class="player-info" onclick="expandPlayer()">
            <div id="playerTitle"></div>
            <div id="playerArtist"></div>

            <div id="progressContainer" onclick="scrubAudio(event)">
                <div id="progressBar"></div>
            </div>

            <div class="player-times">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="player-controls">
            <button id="downloadBtn" title="Save to App for Offline" onclick="downloadCurrentSong(event)">⬇️</button>
            <button id="loopBtn" title="Loop Song" onclick="toggleLoop(event)">🔁</button>
            <button onclick="prevSong(event)">⏮</button>
            <button onclick="togglePlay(event)" id="playPauseBtn">▶ / ⏸</button>
            <button onclick="nextSong(event)">⏭</button>
        </div>
    </div>
</div>

<script>
// --- DATABASE (IndexedDB) FOR OFFLINE STORAGE ---
let db;
const request = indexedDB.open("SkyMusicDB", 1);

// Tracks all URLs that are saved offline so we can display them in the "Downloaded" grid
let downloadedURLs = JSON.parse(localStorage.getItem('downloadedURLs')) || [];

request.onupgradeneeded = function(event) {
    db = event.target.result;
    if (!db.objectStoreNames.contains("offlineAudio")) {
        db.createObjectStore("offlineAudio"); 
    }
};

request.onsuccess = function(event) {
    db = event.target.result;
};

request.onerror = function(event) {
    console.error("Database error: " + event.target.errorCode);
};

function saveSongOffline(url, blob, silent = false) {
    const transaction = db.transaction(["offlineAudio"], "readwrite");
    const store = transaction.objectStore("offlineAudio");
    store.put(blob, url);
    transaction.oncomplete = () => {
        if (!downloadedURLs.includes(url)) {
            downloadedURLs.push(url);
            localStorage.setItem('downloadedURLs', JSON.stringify(downloadedURLs));
            renderLibrary(); 
        }
        if (!silent) alert("Song saved offline successfully! You can find it in your Library.");
    };
    transaction.onerror = () => {
        if (!silent) alert("Failed to save song to database.");
    };
}

function getOfflineSong(url) {
    return new Promise((resolve, reject) => {
        if (!db) return resolve(null);
        const transaction = db.transaction(["offlineAudio"], "readonly");
        const store = transaction.objectStore("offlineAudio");
        const request = store.get(url);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

// --- DATA AND STATE ---
let songs = JSON.parse(localStorage.getItem('songs')) || [
    {title:"Dream Waves",artist:"Sky Artist",cover:"https://picsum.photos/200?1",file:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
    {title:"Cloud Drift",artist:"BlueTone",cover:"https://picsum.photos/200?2",file:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"}
];

let likedSongs = [];
let audio = new Audio();
let currentSong = 0;
let isLooping = false; 
let currentObjectURL = null; 

// --- INITIAL LOAD ---
function loadSongs() {
    let grid = document.getElementById("songGrid");
    grid.innerHTML = "";
    songs.forEach((song, index) => {
        let liked = likedSongs.includes(song);
        grid.innerHTML += `
        <div class="card">
            <div class="like" onclick="toggleLike(event,${index})">${liked ? "💙" : "🤍"}</div>
            <div onclick="playSong(${index})">
                <div class="cover" style="background-image:url('${song.cover}')"></div>
                <div class="title">${song.title}</div>
                <div class="artist">${song.artist}</div>
            </div>
        </div>`;
    });
}
loadSongs();

// --- PLAYER EXPAND/SHRINK ---
function expandPlayer() { document.getElementById("player").classList.add("fullscreen"); }
function shrinkPlayer(event) { document.getElementById("player").classList.remove("fullscreen"); if(event) event.stopPropagation(); }

// --- AUDIO PLAYBACK ---
async function playSong(index) {
    currentSong = index;
    let song = songs[index];
    let audioSource = song.file;

    let offlineBlob = await getOfflineSong(song.file);
    
    if (currentObjectURL) {
        URL.revokeObjectURL(currentObjectURL);
        currentObjectURL = null;
    }

    if (offlineBlob) {
        console.log("Playing offline version from database!");
        currentObjectURL = URL.createObjectURL(offlineBlob);
        audioSource = currentObjectURL;
    } else {
        console.log("Streaming from internet...");
    }

    audio.src = audioSource;
    audio.loop = isLooping; 
    audio.play();

    document.getElementById("player").style.display = "flex";
    document.getElementById("playerCover").src = song.cover;
    document.getElementById("playerTitle").innerText = song.title;
    document.getElementById("playerArtist").innerText = song.artist;

    audio.addEventListener('loadedmetadata', () => {
        document.getElementById("duration").innerText = formatTime(audio.duration);
    });
}

function togglePlay(event) {
    if(event) event.stopPropagation();
    if (audio.paused) audio.play();
    else audio.pause();
}

function nextSong(event) {
    if(event) event.stopPropagation();
    currentSong = (currentSong + 1) % songs.length;
    playSong(currentSong);
}

function prevSong(event) {
    if(event) event.stopPropagation();
    currentSong = (currentSong - 1 + songs.length) % songs.length;
    playSong(currentSong);
}

function toggleLoop(event) {
    if(event) event.stopPropagation();
    isLooping = !isLooping;
    audio.loop = isLooping; 
    
    let loopBtn = document.getElementById("loopBtn");
    if (isLooping) loopBtn.classList.add("loop-active"); 
    else loopBtn.classList.remove("loop-active");
}

// --- LIBRARY, LIKES, AND OFFLINE DOWNLOADS ---
function toggleLike(event, index) {
    event.stopPropagation();
    let song = songs[index];
    let pos = likedSongs.indexOf(song);
    
    if (pos === -1) likedSongs.push(song); 
    else likedSongs.splice(pos, 1); 
    
    renderLibrary();
    loadSongs(); 
}

function renderLibrary() {
    let likedGrid = document.getElementById("likedSongsGrid");
    let downloadedGrid = document.getElementById("downloadedSongsGrid");
    
    likedGrid.innerHTML = "";
    downloadedGrid.innerHTML = "";
    
    if (likedSongs.length === 0) {
        likedGrid.innerHTML = "<p style='color:#e2e8f0; grid-column: 1 / -1; font-size:14px;'>No liked songs yet.</p>";
    } else {
        likedSongs.forEach(song => {
            let index = songs.indexOf(song);
            let isDownloaded = downloadedURLs.includes(song.file) || song.file.startsWith("local_");
            let downloadBtnHTML = isDownloaded ? "" : `<div class="download-icon" title="Save to App for Offline" onclick="downloadSongFile(event, '${song.file}')">⬇️</div>`;
            
            likedGrid.innerHTML += `
            <div class="card" onclick="playSong(${index})">
                ${downloadBtnHTML}
                <div class="like" title="Remove Like" onclick="toggleLike(event,${index})">💙</div>
                <div class="cover" style="background-image:url('${song.cover}')"></div>
                <div class="title">${song.title}</div>
                <div class="artist">${song.artist}</div>
            </div>`;
        });
    }

    let offlineSongs = songs.filter(s => downloadedURLs.includes(s.file) || s.file.startsWith("local_"));

    if (offlineSongs.length === 0) {
        downloadedGrid.innerHTML = "<p style='color:#e2e8f0; grid-column: 1 / -1; font-size:14px;'>No songs downloaded for offline listening yet.</p>";
    } else {
        offlineSongs.forEach(song => {
            let index = songs.indexOf(song);
            let liked = likedSongs.includes(song);
            
            downloadedGrid.innerHTML += `
            <div class="card" onclick="playSong(${index})">
                <div class="like" title="Toggle Like" onclick="toggleLike(event,${index})">${liked ? "💙" : "🤍"}</div>
                <div class="cover" style="background-image:url('${song.cover}')"></div>
                <div class="title">${song.title}</div>
                <div class="artist">${song.artist}</div>
            </div>`;
        });
    }
}

async function downloadSongFile(event, url) {
    event.stopPropagation(); 
    triggerOfflineSave(url);
}

async function downloadCurrentSong(event) {
    if (event) event.stopPropagation(); 
    let song = songs[currentSong];
    if (!song || song.file.startsWith("local_") || downloadedURLs.includes(song.file)) {
        alert("This song is already saved offline in your Library!");
        return;
    }
    triggerOfflineSave(song.file);
}

// Core Offline Save Function (Updated with CORS Proxy)
async function triggerOfflineSave(url) {
    try {
        alert("Downloading song to app... please wait.");
        
        // Use proxy for web URLs, ignore for blobs/local files
        let fetchUrl = url.startsWith("http") ? "https://corsproxy.io/?" + encodeURIComponent(url) : url;
        
        const response = await fetch(fetchUrl);
        if (!response.ok) throw new Error("Network response was not ok");
        const blob = await response.blob();
        
        saveSongOffline(url, blob);
    } catch (error) {
        console.warn("Proxy/CORS Blocked Download:", error);
        alert("The server blocked the download, and the proxy couldn't bypass it. Please use the 'Upload MP3' option in the Add tab instead!");
    }
}

// --- SEARCH ---
function searchSongs() {
    if (!document.getElementById("search").classList.contains("active")) return;
    let query = document.getElementById("searchInput").value.toLowerCase();
    let results = document.getElementById("searchResults");
    results.innerHTML = "";
    
    songs.forEach((song, index) => {
        if (song.title.toLowerCase().includes(query) || song.artist.toLowerCase().includes(query)) {
            let liked = likedSongs.includes(song);
            results.innerHTML += `
            <div class="card">
                <div class="like" onclick="toggleLike(event,${index})">${liked ? "💙" : "🤍"}</div>
                <div onclick="playSong(${index})">
                    <div class="cover" style="background-image:url('${song.cover}')"></div>
                    <div class="title">${song.title}</div>
                    <div class="artist">${song.artist}</div>
                </div>
            </div>`;
        }
    });
}

// --- ADD SONG (WITH LOCAL FILE SUPPORT) ---
function addSong() {
    let name = document.getElementById("songName").value;
    let artist = document.getElementById("artistName").value || "Unknown Artist";
    let cover = document.getElementById("coverURL").value || ("https://picsum.photos/200?random=" + Math.random());
    
    let urlInput = document.getElementById("songURL").value;
    let fileInput = document.getElementById("localAudio").files[0];

    if (!name) {
        alert("Enter a song name!");
        return;
    }

    let finalUrl = "";

    if (fileInput) {
        finalUrl = "local_" + Date.now(); 
        saveSongOffline(finalUrl, fileInput, true); 
    } else if (urlInput) {
        finalUrl = urlInput;
    } else {
        alert("Please provide an MP3 URL or upload a local MP3 file.");
        return;
    }

    songs.push({
        title: name,
        artist: artist,
        cover: cover,
        file: finalUrl
    });
    
    localStorage.setItem('songs', JSON.stringify(songs));

    document.getElementById("songName").value = "";
    document.getElementById("artistName").value = "";
    document.getElementById("coverURL").value = "";
    document.getElementById("songURL").value = "";
    document.getElementById("localAudio").value = "";

    loadSongs();
    alert("Song Added Successfully!");
}

// --- NAVIGATION ---
function showSection(section) {
    document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(section).classList.add("active");
    
    document.getElementById("pageTitle").innerText = section.charAt(0).toUpperCase() + section.slice(1);

    if (section === 'library') {
        renderLibrary(); 
    }

    let searchBar = document.getElementById("searchInput");
    if (section === "search") {
        searchBar.style.display = "block";
        searchBar.focus(); 
    } else {
        searchBar.style.display = "none";
        searchBar.value = "";
    }
}

// --- TIME AND PROGRESS BAR ---
function formatTime(sec) {
    if (isNaN(sec)) return "0:00";
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return `${m}:${s < 10 ? '0' + s : s}`;
}

audio.addEventListener('timeupdate', () => {
    if (audio.duration) {
        const percent = (audio.currentTime / audio.duration) * 100;
        document.getElementById("progressBar").style.width = percent + "%";
        document.getElementById("currentTime").innerText = formatTime(audio.currentTime);
    }
});

function scrubAudio(e) {
    e.stopPropagation(); 
    const container = document.getElementById("progressContainer");
    const rect = container.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const percent = clickX / rect.width;
    audio.currentTime = percent * audio.duration;
}

// --- KEYBOARD CONTROLS ---
document.addEventListener("keydown", function(event) {
    let active = document.activeElement.tagName;
    if (active === "INPUT" || active === "TEXTAREA") return;
    
    if (event.code === "Space") {
        event.preventDefault();
        togglePlay();
    }
});

audio.addEventListener('ended', nextSong);

</script>

</body>
</html>
